# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux Theme: dark  (Tokyo Night Dark)
# ══════════════════════════════════════════════════════════════════════════════

$accent             = rgb(7aa2f7)
$accent_alt         = rgb(bb9af7)
$border_inactive    = rgba(41486855)
$shadow_color       = rgba(00000099)
$shadow_color_inactive = rgba(0000004d)

$bg       = #1a1b26
$bg_alt   = #24283b
$surface  = #1f2335
$text     = #c0caf5
$text_dim = #565f89
$text_sub = #a9b1d6
$red      = #f7768e
$green    = #9ece6a
$yellow   = #e0af68
$cyan     = #7dcfff
$magenta  = #bb9af7
$orange   = #ff9e64

# ── Waybar @define-color entries ──────────────────────────────────────────────
# Format: #@wb <name> <value>   (no colon, no semicolon — generator adds those)
#@wb bg rgba(26, 27, 38, 0.92)
#@wb bg_solid #1a1b26
#@wb surface rgba(36, 40, 59, 0.85)
#@wb surface_hl rgba(65, 72, 104, 0.55)
#@wb border rgba(122, 162, 247, 0.20)
#@wb border_hover rgba(122, 162, 247, 0.55)
#@wb accent #7aa2f7
#@wb accent_dim rgba(122, 162, 247, 0.15)
#@wb accent_glow rgba(122, 162, 247, 0.28)
#@wb text_color #c0caf5
#@wb text_dim #565f89
#@wb text_sub #a9b1d6
#@wb col_red #f7768e
#@wb col_green #9ece6a
#@wb col_yellow #e0af68
#@wb col_cyan #7dcfff
#@wb col_magenta #bb9af7
#@wb col_orange #ff9e64
