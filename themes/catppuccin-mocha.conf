# ── Palette reference ─────────────────────────────────────────────────────────
$bg         = #1e1e2e
$bg_alt     = #181825
$surface    = #313244
$text       = #cdd6f4
$text_dim   = #6c7086
$text_sub   = #bac2de
$red        = #f38ba8
$green      = #a6e3a1
$yellow     = #f9e2af
$cyan       = #89dceb
$magenta    = #cba6f7
$orange     = #fab387

