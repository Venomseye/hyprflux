# ── Palette reference ─────────────────────────────────────────────────────────
$bg         = #2e3440
$bg_alt     = #3b4252
$surface    = #434c5e
$text       = #eceff4
$text_dim   = #4c566a
$text_sub   = #d8dee9
$red        = #bf616a
$green      = #a3be8c
$yellow     = #ebcb8b
$cyan       = #8fbcbb
$magenta    = #b48ead
$orange     = #d08770

