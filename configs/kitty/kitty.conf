# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — kitty.conf
# Full Kitty terminal configuration.
# ══════════════════════════════════════════════════════════════════════════════

# ── Fonts ─────────────────────────────────────────────────────────────────────
font_family               JetBrainsMono Nerd Font
bold_font                 JetBrainsMono Nerd Font Bold
italic_font               JetBrainsMono Nerd Font Italic
bold_italic_font          JetBrainsMono Nerd Font Bold Italic
font_size                 13.0

# Font features — enable ligatures
font_features             JetBrainsMonoNF-Regular    +liga +calt
font_features             JetBrainsMonoNF-Bold        +liga +calt
font_features             JetBrainsMonoNF-Italic      +liga +calt
font_features             JetBrainsMonoNF-BoldItalic  +liga +calt

# Adjust vertical character alignment
adjust_line_height        2
adjust_column_width       0
adjust_baseline           0

# Disable blinking cursor when inactive
cursor_stop_blinking_after 15.0

# ── Cursor ────────────────────────────────────────────────────────────────────
cursor_shape              block
cursor_blink_interval     0.5
cursor_blink_interval     -1     # Use system default

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines          10000
scrollback_pager          less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
scrollback_fill_enlarged_window no

# ── Mouse ─────────────────────────────────────────────────────────────────────
mouse_hide_wait           3.0
url_color                 #89b4fa
url_style                 curly
open_url_with             default
url_prefixes              file ftp ftps gemini git http https irc ircs kitty mailto news sftp ssh
detect_urls               yes
copy_on_select            no
paste_actions             quote-urls-at-prompt

# ── Performance ───────────────────────────────────────────────────────────────
repaint_delay             10
input_delay               3
sync_to_monitor           yes

# ── Terminal bell ─────────────────────────────────────────────────────────────
enable_audio_bell         no
visual_bell_duration      0.0
window_alert_on_bell      yes
bell_on_tab               "🔔 "

# ── Window layout ─────────────────────────────────────────────────────────────
remember_window_size      yes
initial_window_width      1200
initial_window_height     700

# Padding around content
window_padding_width      14 18

# Hide the title bar (Hyprland draws the border)
hide_window_decorations   yes

# Resize in small increments
resize_in_steps           no

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_bar_min_tabs          2
tab_bar_align             left
tab_title_template        " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title} "
active_tab_font_style     bold
inactive_tab_font_style   normal

# ── Colour scheme — HyprFlux Dark ─────────────────────────────────────────────
# Matches the dark.conf palette exactly.
background                #1a1b26
foreground                #c0caf5
selection_background      #364A82
selection_foreground      #c0caf5

# Cursor
cursor                    #c0caf5
cursor_text_color         #1a1b26

# URL
url_color                 #73daca

# Black
color0                    #15161e
color8                    #414868

# Red
color1                    #f7768e
color9                    #f7768e

# Green
color2                    #9ece6a
color10                   #9ece6a

# Yellow
color3                    #e0af68
color11                   #e0af68

# Blue
color4                    #7aa2f7
color12                   #7aa2f7

# Magenta
color5                    #bb9af7
color13                   #bb9af7

# Cyan
color6                    #7dcfff
color14                   #7dcfff

# White
color7                    #a9b1d6
color15                   #c0caf5

# Tab bar colours
active_tab_background     #7aa2f7
active_tab_foreground     #1a1b26
inactive_tab_background   #24283b
inactive_tab_foreground   #565f89
tab_bar_background        #1a1b26

# ── Transparency ──────────────────────────────────────────────────────────────
background_opacity        0.92
background_blur           1
dynamic_background_color  no

# ── Advanced ──────────────────────────────────────────────────────────────────
shell                     .
editor                    .
close_on_child_death      no
allow_remote_control      socket-only
listen_on                 unix:@mykitty
update_check_interval     0

# Clipboard
clipboard_control         write-clipboard write-primary read-clipboard-ask read-primary-ask

# Environment
term                      xterm-256color

# ── Keyboard shortcuts ────────────────────────────────────────────────────────
# Clear all built-in shortcuts and define only what we need
clear_all_shortcuts       yes

# Copy / paste
map ctrl+shift+c          copy_to_clipboard
map ctrl+shift+v          paste_from_clipboard
map ctrl+shift+s          paste_from_selection

# Scrolling
map ctrl+shift+k          scroll_line_up
map ctrl+shift+j          scroll_line_down
map ctrl+shift+page_up    scroll_page_up
map ctrl+shift+page_down  scroll_page_down
map ctrl+shift+home       scroll_home
map ctrl+shift+end        scroll_end

# Tabs
map ctrl+shift+t          new_tab_with_cwd
map ctrl+shift+w          close_tab
map ctrl+shift+right      next_tab
map ctrl+shift+left       previous_tab
map ctrl+shift+l          next_tab
map ctrl+shift+h          previous_tab
map ctrl+alt+1            goto_tab 1
map ctrl+alt+2            goto_tab 2
map ctrl+alt+3            goto_tab 3
map ctrl+alt+4            goto_tab 4
map ctrl+alt+5            goto_tab 5

# Windows (Kitty splits)
map ctrl+shift+enter      new_window_with_cwd
map ctrl+shift+]          next_window
map ctrl+shift+[          previous_window
map ctrl+shift+f          move_window_forward
map ctrl+shift+b          move_window_backward

# Font size
map ctrl+shift+equal      change_font_size all +1.0
map ctrl+shift+minus      change_font_size all -1.0
map ctrl+shift+0          change_font_size all 0

# Misc
map ctrl+shift+u          kitten unicode_input
map ctrl+shift+f2         edit_config_file
map ctrl+shift+escape     show_scrollback
map ctrl+shift+delete     clear_terminal reset active
map ctrl+shift+F11        toggle_fullscreen
