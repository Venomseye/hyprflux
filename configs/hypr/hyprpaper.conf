# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — hyprpaper.conf
# Initial config. wallpaper.sh overwrites this file when you set a wallpaper.
# Run `wallpaper menu` (Super+W) or `wallpaper random` (Super+Shift+W) to
# apply your first wallpaper.
# ══════════════════════════════════════════════════════════════════════════════

# Enable IPC so wallpaper.sh can communicate with the running daemon
ipc = on

# Silence the Hyprpaper splash
splash = false

# ── Add your wallpaper paths below ───────────────────────────────────────────
# Uncomment and edit after placing images in ~/Pictures/Wallpapers/
# preload  = ~/Pictures/Wallpapers/your-wallpaper.jpg
# wallpaper = ,~/Pictures/Wallpapers/your-wallpaper.jpg
