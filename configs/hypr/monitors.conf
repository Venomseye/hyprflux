# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — monitors.conf
# Monitor / display configuration.
# ══════════════════════════════════════════════════════════════════════════════
#
# Syntax:
#   monitor = <name>, <resolution>@<refresh>, <position>, <scale>
#
# Run `hyprctl monitors` to list connected displays and their names.
# Run `hyprctl monitors all` to include disconnected outputs.
#
# ══════════════════════════════════════════════════════════════════════════════

# ── Default: use preferred settings for all connected monitors ────────────────
# This is the safest fallback — Hyprland will auto-negotiate resolution,
# refresh rate, and scale for every connected display.
monitor = ,preferred,auto,auto

# ══════════════════════════════════════════════════════════════════════════════
# COMMON CONFIGURATIONS (uncomment and adapt as needed)
# ══════════════════════════════════════════════════════════════════════════════

# ── Single 1080p monitor at 60 Hz ─────────────────────────────────────────────
# monitor = HDMI-A-1, 1920x1080@60, 0x0, 1

# ── Single 1440p monitor at 144 Hz ────────────────────────────────────────────
# monitor = DP-1, 2560x1440@144, 0x0, 1

# ── Single 4K monitor at 60 Hz, scaled to 1.5x for comfort ───────────────────
# monitor = DP-1, 3840x2160@60, 0x0, 1.5

# ── Laptop display (HiDPI) ────────────────────────────────────────────────────
# monitor = eDP-1, 2560x1600@120, 0x0, 2

# ── Dual monitor: primary 1440p left, secondary 1080p right ──────────────────
# monitor = DP-1,  2560x1440@144, 0x0,      1
# monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1

# ── Dual monitor: laptop + external, external is primary ─────────────────────
# monitor = eDP-1,    2560x1600@120, 1920x0, 2
# monitor = HDMI-A-1, 1920x1080@60, 0x0,    1

# ── Mirror two monitors ───────────────────────────────────────────────────────
# monitor = DP-1,    1920x1080@60, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 0x0, 1, mirror, DP-1

# ── Disable a monitor (useful for clamshell laptop mode) ─────────────────────
# monitor = eDP-1, disable

# ══════════════════════════════════════════════════════════════════════════════
# WORKSPACE BINDING (uncomment to pin workspaces to monitors)
# Requires named monitors (see above — replace "auto" with a position).
# ══════════════════════════════════════════════════════════════════════════════

# workspace = 1, monitor:DP-1,  default:true
# workspace = 2, monitor:DP-1
# workspace = 3, monitor:DP-1
# workspace = 4, monitor:DP-1
# workspace = 5, monitor:DP-1
# workspace = 6, monitor:HDMI-A-1, default:true
# workspace = 7, monitor:HDMI-A-1
# workspace = 8, monitor:HDMI-A-1
# workspace = 9, monitor:HDMI-A-1
# workspace = 10, monitor:HDMI-A-1
