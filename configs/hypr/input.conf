# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — input.conf
# Keyboard, mouse, and touchpad configuration.
# ══════════════════════════════════════════════════════════════════════════════

input {
    # ── Keyboard ──────────────────────────────────────────────────────────────
    kb_layout        = us
    kb_variant       =
    kb_model         =
    kb_options       = caps:super        # Remap CapsLock → Super (optional)
    kb_rules         =
    kb_file          =

    # ── Pointer ───────────────────────────────────────────────────────────────
    follow_mouse     = 1                 # Focus follows cursor
    mouse_refocus    = true
    float_switch_override_focus = 2      # Float windows get focus on hover too

    sensitivity      = 0.0              # -1.0 to 1.0; 0 = no adjustment
    accel_profile    = flat             # flat | adaptive | custom
    force_no_accel   = false

    # ── Scroll ────────────────────────────────────────────────────────────────
    scroll_method    = 2fg              # 2fg | edge | on_button_down | no_scroll
    scroll_factor    = 1.0
    natural_scroll   = false

    # ── Left-handed mode ──────────────────────────────────────────────────────
    left_handed      = false

    # ── Click method ──────────────────────────────────────────────────────────
    # (touchpad only — overridden per-device below)
    clickfinger_behavior = false

    # ── Touchpad ──────────────────────────────────────────────────────────────
    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
        tap-and-drag         = true
        drag_lock            = false
        middle_button_emulation = false
        clickfinger_behavior = true     # 1-finger = left, 2-finger = right, 3-finger = middle
        scroll_factor        = 0.8
        tap_button_map       = lrm
    }

    # ── Touchscreen ───────────────────────────────────────────────────────────
    touchdevice {
        transform  = 0
        output     =
        enabled    = true
    }
}

# ── Per-device overrides ───────────────────────────────────────────────────────
# Run `hyprctl devices` to list device names.
# Example: make a gaming mouse use flat acceleration with higher sensitivity.
#
# device {
#     name            = logitech-g-pro-wireless-gaming-mouse
#     sensitivity     = 0.3
#     accel_profile   = flat
# }
#
# Example: disable a built-in touchpad when a USB mouse is plugged in.
#
# device {
#     name            = synps/2-synaptics-touchpad
#     enabled         = false
# }

# ── Gestures ──────────────────────────────────────────────────────────────────
gestures {
    workspace_swipe              = true
    workspace_swipe_fingers      = 3
    workspace_swipe_distance     = 300
    workspace_swipe_invert       = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new   = false
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
}

# ── Binds ─────────────────────────────────────────────────────────────────────
binds {
    allow_workspace_cycles        = true    # Super+Tab cycles between last two
    workspace_back_and_forth      = true
    focus_preferred_method        = 0       # 0 = history, 1 = length
    ignore_group_lock             = false
    movefocus_cycles_fullscreen   = false
}
