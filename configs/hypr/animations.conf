# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — animations.conf
# Animation curves and timing for a smooth, premium feel.
# ══════════════════════════════════════════════════════════════════════════════

animations {
    enabled          = true
    first_launch_animation = true

    # ── Bezier curves ──────────────────────────────────────────────────────────
    # Syntax: bezier = <name>, <x0>, <y0>, <x1>, <y1>
    # Visualise curves at: https://cubic-bezier.com/

    # Snappy ease-out for windows appearing / workspaces switching
    bezier = easeOutQuint,  0.22, 1.0,  0.36, 1.0

    # Gentle spring for resizing and moving
    bezier = easeInOutCubic, 0.65, 0.0, 0.35, 1.0

    # Soft deceleration for fades
    bezier = easeOutSine,   0.39, 0.575, 0.565, 1.0

    # Overshoot for borders (subtle pop)
    bezier = easeOutBack,   0.34, 1.56,  0.64, 1.0

    # Linear — for opacity changes
    bezier = linear,        0.0,  0.0,   1.0,  1.0

    # ── Window animations ──────────────────────────────────────────────────────
    # animation = <event>, <enabled>, <duration_ms>, <curve>, [style]

    # Window open: slide in from bottom with slight scale
    animation = windowsIn,    1, 4,  easeOutQuint, slide

    # Window close: quick fade out downward
    animation = windowsOut,   1, 3,  easeOutSine, slide

    # Window move/resize: smooth and snappy
    animation = windowsMove,  1, 4,  easeInOutCubic

    # ── Layer animations (Waybar, Rofi, Dunst, SwayNC) ────────────────────────
    animation = layersIn,     1, 3,  easeOutQuint, slide
    animation = layersOut,    1, 2,  easeOutSine,  slide

    # ── Fade animations ────────────────────────────────────────────────────────
    animation = fadeIn,       1, 3,  easeOutSine
    animation = fadeOut,      1, 2,  easeOutSine
    animation = fadeDim,      1, 3,  easeOutSine
    animation = fadeSwitch,   1, 3,  easeOutSine
    animation = fadeShadow,   1, 3,  easeOutSine
    animation = fadeLayersIn, 1, 3,  easeOutQuint
    animation = fadeLayersOut,1, 2,  easeOutSine

    # ── Workspace transition ───────────────────────────────────────────────────
    # slidevert for up/down, slide for left/right
    animation = workspaces,      1, 5,  easeOutQuint, slide
    animation = specialWorkspace,1, 4,  easeOutQuint, slidevert

    # ── Border gradient rotation ───────────────────────────────────────────────
    animation = border,          1, 10, linear
    animation = borderangle,     1, 30, linear, loop
}
