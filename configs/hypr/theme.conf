# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — theme.conf
# ══════════════════════════════════════════════════════════════════════════════
# This file is the single source of truth for all colours used by Hyprland.
# It sources the active theme file (managed by theme-switch.sh).
# Waybar, Rofi, Kitty, Dunst, and SwayNC all read from their own CSS/config
# files that mirror this palette — regenerated by theme-switch.sh.
# ══════════════════════════════════════════════════════════════════════════════

# Source the active theme symlink.
# theme-switch.sh updates: ~/.config/hyprflux/themes/active.conf
source = ~/.config/hyprflux/themes/active.conf

# ── Derived border colours (use Hypr gradient syntax) ─────────────────────────
# These reference $accent and $accent_alt defined in the active theme file.
# Override here if you want a static non-gradient border.

# Active window:   vibrant accent gradient
# Inactive window: subtle, nearly invisible border
# Both set in hyprland.conf general {} block using $accent / $border_inactive
