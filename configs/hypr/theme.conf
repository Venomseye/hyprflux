# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — theme.conf
# ══════════════════════════════════════════════════════════════════════════════
# Fallback colours are defined first so Hyprland always has valid values
# even if the active.conf symlink is missing on first boot.
# theme-switch.sh updates the symlink; the sourced file then overrides below.
# ══════════════════════════════════════════════════════════════════════════════

# ── Fallback palette (Tokyo Night Dark) ──────────────────────────────────────
$accent                 = rgb(7aa2f7)
$accent_alt             = rgb(bb9af7)
$border_inactive        = rgba(41486855)
$shadow_color           = rgba(00000099)
$shadow_color_inactive  = rgba(0000004d)

$bg                     = rgba(1a1b26ff)
$bg_alt                 = rgba(24283bff)
$surface                = rgba(1f2335ff)
$text                   = rgba(c0caf5ff)
$text_dim               = rgba(565f89ff)
$red                    = rgba(f7768eff)
$green                  = rgba(9ece6aff)
$yellow                 = rgba(e0af68ff)
$cyan                   = rgba(7dcfffff)
$magenta                = rgba(bb9af7ff)
$orange                 = rgba(ff9e64ff)

# ── Active theme override (managed by theme-switch.sh) ────────────────────────
# If this file is missing Hyprland will warn but the fallback above applies.
source = ~/.config/hyprflux/themes/active.conf
