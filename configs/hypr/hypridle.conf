# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — hypridle.conf
# Idle management: dims screen → locks → turns off display → suspends.
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/
# ══════════════════════════════════════════════════════════════════════════════

general {
    # Lock before sleep so the screen is protected immediately on wake
    lock_cmd            = pidof hyprlock || hyprlock

    # Lock on suspend (e.g. lid close)
    before_sleep_cmd    = loginctl lock-session

    # Turn screen back on after wake
    after_sleep_cmd     = hyprctl dispatch dpms on

    ignore_dbus_inhibit     = false
    ignore_systemd_inhibit  = false
}

# ── 1. Dim backlight after 2.5 min ───────────────────────────────────────────
listener {
    timeout     = 150                           # 2 min 30 sec
    on-timeout  = brightnessctl -s set 10       # save & drop to 10%
    on-resume   = brightnessctl -r              # restore saved brightness
}

# ── 2. Lock screen after 5 min ───────────────────────────────────────────────
listener {
    timeout     = 300                           # 5 min
    on-timeout  = loginctl lock-session
}

# ── 3. Turn display off 30 sec after lock ────────────────────────────────────
listener {
    timeout     = 330                           # 5 min 30 sec
    on-timeout  = hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# ── 4. Suspend after 30 min of inactivity ────────────────────────────────────
listener {
    timeout     = 1800                          # 30 min
    on-timeout  = systemctl suspend
}
