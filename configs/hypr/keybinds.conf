# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — keybinds.conf
# All keyboard and mouse bindings, grouped by category.
# ══════════════════════════════════════════════════════════════════════════════
#
# Syntax:
#   bind  = <mods>, <key>, <dispatcher>, [args]
#   bindm = <mods>, <key>, <mouse dispatcher>, [args]   (mouse actions)
#   binde = <mods>, <key>, <dispatcher>, [args]          (repeating on hold)
#   bindl = <mods>, <key>, <dispatcher>, [args]          (locked — works on lockscreen)
#   bindr = <mods>, <key>, <dispatcher>, [args]          (triggers on key release)
#
# Modifier aliases:
#   SUPER   = Windows/Meta key
#   SHIFT   = Shift
#   CTRL    = Control
#   ALT     = Alt
# ══════════════════════════════════════════════════════════════════════════════

# ── Script and binary locations ────────────────────────────────────────────────
$terminal   = kitty
$launcher   = rofi -show drun -config ~/.config/rofi/launcher.rasi
$filesrv    = thunar
$browser    = firefox
$editor     = kitty -e nvim
$powermenu  = ~/.local/share/hyprflux/scripts/powermenu.sh
$screenshot = ~/.local/share/hyprflux/scripts/screenshot.sh
$wallpaper  = ~/.local/share/hyprflux/scripts/wallpaper.sh
$volume     = ~/.local/share/hyprflux/scripts/volume.sh
$brightness = ~/.local/share/hyprflux/scripts/brightness.sh
$recorder   = ~/.local/share/hyprflux/scripts/record-screen.sh
$themeswitch = ~/.local/share/hyprflux/scripts/theme-switch.sh

# ══════════════════════════════════════════════════════════════════════════════
# CORE — launch, quit, reload
# ══════════════════════════════════════════════════════════════════════════════

bind  = SUPER,       Return,    exec, $terminal
bind  = SUPER,       Space,     exec, $launcher
bind  = SUPER,       E,         exec, $filesrv
bind  = SUPER,       B,         exec, $browser

# Close focused window
bind  = SUPER,       Q,         killactive

# Force-kill focused window (use when killactive doesn't respond)
bind  = SUPER SHIFT, Q,         forcekillactive

# Reload Hyprland config
bind  = SUPER SHIFT, R,         exec, hyprctl reload && notify-send "HyprFlux" "Config reloaded"

# Exit Hyprland (emergency)
bind  = SUPER SHIFT, Escape,    exit

# Power menu
bind  = SUPER SHIFT, E,         exec, $powermenu

# ══════════════════════════════════════════════════════════════════════════════
# WINDOWS — focus, move, resize, float
# ══════════════════════════════════════════════════════════════════════════════

# ── Focus ─────────────────────────────────────────────────────────────────────
bind  = SUPER,       H,         movefocus, l
bind  = SUPER,       L,         movefocus, r
bind  = SUPER,       K,         movefocus, u
bind  = SUPER,       J,         movefocus, d

# Arrow key alternatives
bind  = SUPER,       left,      movefocus, l
bind  = SUPER,       right,     movefocus, r
bind  = SUPER,       up,        movefocus, u
bind  = SUPER,       down,      movefocus, d

# Cycle focus in history order
bind  = ALT,         Tab,       cyclenext
bind  = ALT SHIFT,   Tab,       cyclenext, prev

# Focus the urgent window
bind  = SUPER,       U,         focusurgentorlast

# ── Move windows ──────────────────────────────────────────────────────────────
bind  = SUPER SHIFT, H,         movewindow, l
bind  = SUPER SHIFT, L,         movewindow, r
bind  = SUPER SHIFT, K,         movewindow, u
bind  = SUPER SHIFT, J,         movewindow, d

bind  = SUPER SHIFT, left,      movewindow, l
bind  = SUPER SHIFT, right,     movewindow, r
bind  = SUPER SHIFT, up,        movewindow, u
bind  = SUPER SHIFT, down,      movewindow, d

# ── Resize windows (hold and repeat) ──────────────────────────────────────────
binde = SUPER CTRL,  H,         resizeactive, -40 0
binde = SUPER CTRL,  L,         resizeactive,  40 0
binde = SUPER CTRL,  K,         resizeactive,  0 -40
binde = SUPER CTRL,  J,         resizeactive,  0  40

binde = SUPER CTRL,  left,      resizeactive, -40 0
binde = SUPER CTRL,  right,     resizeactive,  40 0
binde = SUPER CTRL,  up,        resizeactive,  0 -40
binde = SUPER CTRL,  down,      resizeactive,  0  40

# ── Float ─────────────────────────────────────────────────────────────────────
bind  = SUPER,       F,         togglefloating
bind  = SUPER ALT,   F,         pin                    # Pin floating on top
bind  = SUPER,       C,         centerwindow           # Centre floating window

# ── Fullscreen ────────────────────────────────────────────────────────────────
bind  = SUPER,       M,         fullscreen, 0           # Real fullscreen
bind  = SUPER ALT,   M,         fullscreen, 1           # Maximise (keep gaps)

# ── Layout-specific ───────────────────────────────────────────────────────────
bind  = SUPER,       P,         pseudo                  # Dwindle: pseudotile toggle
bind  = SUPER,       T,         togglesplit             # Dwindle: toggle split orientation

# Swap with master (master layout)
bind  = SUPER SHIFT, M,         layoutmsg, swapwithmaster

# ── Groups (tabbed containers) ────────────────────────────────────────────────
bind  = SUPER,       G,         togglegroup
bind  = SUPER,       Tab,       changegroupactive, f
bind  = SUPER SHIFT, Tab,       changegroupactive, b
bind  = SUPER ALT,   H,         moveintogroup, l
bind  = SUPER ALT,   L,         moveintogroup, r
bind  = SUPER ALT,   K,         moveintogroup, u
bind  = SUPER ALT,   J,         moveintogroup, d
bind  = SUPER ALT,   U,         moveoutofgroup

# ── Mouse — drag to move / resize ─────────────────────────────────────────────
bindm = SUPER,       mouse:272, movewindow              # Super + LMB = move
bindm = SUPER,       mouse:273, resizewindow            # Super + RMB = resize

# ── Scroll over Waybar to change volume ───────────────────────────────────────
bind  = ,            mouse:277, exec, $volume up
bind  = ,            mouse:276, exec, $volume down

# ══════════════════════════════════════════════════════════════════════════════
# WORKSPACES
# ══════════════════════════════════════════════════════════════════════════════

# ── Switch to workspace 1–10 ──────────────────────────────────────────────────
bind  = SUPER,       1,         workspace, 1
bind  = SUPER,       2,         workspace, 2
bind  = SUPER,       3,         workspace, 3
bind  = SUPER,       4,         workspace, 4
bind  = SUPER,       5,         workspace, 5
bind  = SUPER,       6,         workspace, 6
bind  = SUPER,       7,         workspace, 7
bind  = SUPER,       8,         workspace, 8
bind  = SUPER,       9,         workspace, 9
bind  = SUPER,       0,         workspace, 10

# ── Move focused window to workspace 1–10 ─────────────────────────────────────
bind  = SUPER SHIFT, 1,         movetoworkspace, 1
bind  = SUPER SHIFT, 2,         movetoworkspace, 2
bind  = SUPER SHIFT, 3,         movetoworkspace, 3
bind  = SUPER SHIFT, 4,         movetoworkspace, 4
bind  = SUPER SHIFT, 5,         movetoworkspace, 5
bind  = SUPER SHIFT, 6,         movetoworkspace, 6
bind  = SUPER SHIFT, 7,         movetoworkspace, 7
bind  = SUPER SHIFT, 8,         movetoworkspace, 8
bind  = SUPER SHIFT, 9,         movetoworkspace, 9
bind  = SUPER SHIFT, 0,         movetoworkspace, 10

# ── Move window silently (stay on current workspace) ──────────────────────────
bind  = SUPER CTRL SHIFT, 1,    movetoworkspacesilent, 1
bind  = SUPER CTRL SHIFT, 2,    movetoworkspacesilent, 2
bind  = SUPER CTRL SHIFT, 3,    movetoworkspacesilent, 3
bind  = SUPER CTRL SHIFT, 4,    movetoworkspacesilent, 4
bind  = SUPER CTRL SHIFT, 5,    movetoworkspacesilent, 5
bind  = SUPER CTRL SHIFT, 6,    movetoworkspacesilent, 6
bind  = SUPER CTRL SHIFT, 7,    movetoworkspacesilent, 7
bind  = SUPER CTRL SHIFT, 8,    movetoworkspacesilent, 8
bind  = SUPER CTRL SHIFT, 9,    movetoworkspacesilent, 9
bind  = SUPER CTRL SHIFT, 0,    movetoworkspacesilent, 10

# ── Navigate workspaces ───────────────────────────────────────────────────────
bind  = SUPER,       bracketleft,  workspace, e-1       # Previous workspace
bind  = SUPER,       bracketright, workspace, e+1       # Next workspace
bind  = SUPER,       comma,        workspace, e-1
bind  = SUPER,       period,       workspace, e+1

# Mouse scroll over workspaces on Waybar
bind  = SUPER,       mouse_down,   workspace, e-1
bind  = SUPER,       mouse_up,     workspace, e+1

# Back-and-forth between last two workspaces
bind  = SUPER,       grave,        workspace, previous

# ── Special workspace (scratchpad) ────────────────────────────────────────────
bind  = SUPER,       S,            togglespecialworkspace, magic
bind  = SUPER SHIFT, S,            movetoworkspace, special:magic

# ── Move workspace to monitor ─────────────────────────────────────────────────
bind  = SUPER SHIFT, greater,      movecurrentworkspacetomonitor, r
bind  = SUPER SHIFT, less,         movecurrentworkspacetomonitor, l

# ══════════════════════════════════════════════════════════════════════════════
# MONITOR FOCUS
# ══════════════════════════════════════════════════════════════════════════════

bind  = SUPER,       semicolon,    focusmonitor, +1
bind  = SUPER SHIFT, semicolon,    movewindow, mon:+1

# ══════════════════════════════════════════════════════════════════════════════
# MEDIA KEYS & HARDWARE BUTTONS
# ══════════════════════════════════════════════════════════════════════════════

# ── Volume (bindl works on lockscreen) ────────────────────────────────────────
bindl = ,  XF86AudioRaiseVolume,  exec, $volume up
bindl = ,  XF86AudioLowerVolume,  exec, $volume down
bindl = ,  XF86AudioMute,         exec, $volume mute
bindl = ,  XF86AudioMicMute,      exec, $volume micmute

# ── Brightness ────────────────────────────────────────────────────────────────
binde = ,  XF86MonBrightnessUp,   exec, $brightness up
binde = ,  XF86MonBrightnessDown, exec, $brightness down

# ── Media playback ────────────────────────────────────────────────────────────
bindl = ,  XF86AudioPlay,         exec, playerctl play-pause
bindl = ,  XF86AudioNext,         exec, playerctl next
bindl = ,  XF86AudioPrev,         exec, playerctl previous
bindl = ,  XF86AudioStop,         exec, playerctl stop

# ══════════════════════════════════════════════════════════════════════════════
# SCREENSHOTS
# ══════════════════════════════════════════════════════════════════════════════

bind  = ,            Print,     exec, $screenshot full        # Full screen
bind  = SHIFT,       Print,     exec, $screenshot region      # Select region
bind  = SUPER,       Print,     exec, $screenshot window      # Active window
bind  = CTRL,        Print,     exec, $screenshot clipboard   # To clipboard

# ══════════════════════════════════════════════════════════════════════════════
# SCREEN RECORDING
# ══════════════════════════════════════════════════════════════════════════════

bind  = SUPER SHIFT, R,         exec, $recorder toggle        # Toggle recording

# ══════════════════════════════════════════════════════════════════════════════
# DESKTOP UTILITIES
# ══════════════════════════════════════════════════════════════════════════════

# Wallpaper picker
bind  = SUPER,       W,         exec, $wallpaper menu

# Set random wallpaper
bind  = SUPER SHIFT, W,         exec, $wallpaper random

# Theme switcher
bind  = SUPER SHIFT, T,         exec, $themeswitch toggle

# Colour picker (hyprpicker)
bind  = SUPER SHIFT, C,         exec, hyprpicker -a

# Clipboard history (cliphist + rofi)
bind  = SUPER,       V,         exec, cliphist list | rofi -dmenu -config ~/.config/rofi/launcher.rasi | cliphist decode | wl-copy

# Emoji picker
bind  = SUPER CTRL,  E,         exec, rofi -show emoji -config ~/.config/rofi/launcher.rasi

# Window switcher
bind  = SUPER,       grave,     exec, rofi -show window -config ~/.config/rofi/launcher.rasi

# Notification center
bind  = SUPER,       N,         exec, swaync-client -t

# Lock screen
bind  = SUPER,       Delete,    exec, hyprlock
bind  = SUPER SHIFT, Delete,    exec, hyprlock

# ══════════════════════════════════════════════════════════════════════════════
# ROFI MENUS
# ══════════════════════════════════════════════════════════════════════════════

# App launcher
bind  = SUPER,       Space,     exec, rofi -show drun  -config ~/.config/rofi/launcher.rasi

# Run command
bind  = SUPER,       R,         exec, rofi -show run   -config ~/.config/rofi/launcher.rasi

# SSH session picker
bind  = SUPER CTRL,  S,         exec, rofi -show ssh   -config ~/.config/rofi/launcher.rasi
