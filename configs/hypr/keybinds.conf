# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — keybinds.conf
# ══════════════════════════════════════════════════════════════════════════════

# ── Main modifier ─────────────────────────────────────────────────────────────
$mainMod = SUPER

# ── Application shortcuts ─────────────────────────────────────────────────────
$terminal    = kitty
$fileManager = thunar
$browser     = firefox
$launcher    = rofi -show drun -config ~/.config/rofi/launcher.rasi

# ── HyprFlux script paths ─────────────────────────────────────────────────────
$scriptsDir  = $HOME/.local/share/hyprflux/scripts

# ══════════════════════════════════════════════════════════════════════════════
# CORE — launch, close, reload
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod,       Return,       exec, $terminal
bind = $mainMod,       Space,        exec, $launcher
bind = $mainMod,       E,            exec, $fileManager
bind = $mainMod,       B,            exec, $browser

bind = $mainMod,       Q,            killactive
bind = $mainMod SHIFT, Q,            forcekillactive

bind = $mainMod SHIFT, R,            exec, hyprctl reload && notify-send "HyprFlux" "Config reloaded"
bind = $mainMod SHIFT, Escape,       exit

bind = $mainMod SHIFT, E,            exec, $scriptsDir/powermenu.sh

# ══════════════════════════════════════════════════════════════════════════════
# WINDOWS — focus
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = ALT,       Tab,  cyclenext
bind = ALT SHIFT, Tab,  cyclenext, prev
bind = $mainMod,  U,    focusurgentorlast

# ══════════════════════════════════════════════════════════════════════════════
# WINDOWS — move
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# ══════════════════════════════════════════════════════════════════════════════
# WINDOWS — resize (binde = repeat on hold)
# ══════════════════════════════════════════════════════════════════════════════

binde = $mainMod CTRL, H,     resizeactive, -40 0
binde = $mainMod CTRL, L,     resizeactive,  40 0
binde = $mainMod CTRL, K,     resizeactive,  0 -40
binde = $mainMod CTRL, J,     resizeactive,  0  40

binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive,  0 -40
binde = $mainMod CTRL, down,  resizeactive,  0  40

# ══════════════════════════════════════════════════════════════════════════════
# WINDOWS — state
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod,       F,         togglefloating
bind = $mainMod ALT,   F,         pin
bind = $mainMod,       C,         centerwindow
bind = $mainMod,       M,         fullscreen, 0
bind = $mainMod ALT,   M,         fullscreen, 1
bind = $mainMod,       P,         pseudo
bind = $mainMod,       T,         togglesplit
bind = $mainMod SHIFT, M,         layoutmsg, swapwithmaster

# ── Groups ────────────────────────────────────────────────────────────────────
bind = $mainMod,       G,         togglegroup
bind = $mainMod,       Tab,       changegroupactive, f
bind = $mainMod SHIFT, Tab,       changegroupactive, b
bind = $mainMod ALT,   H,         moveintogroup, l
bind = $mainMod ALT,   L,         moveintogroup, r
bind = $mainMod ALT,   K,         moveintogroup, u
bind = $mainMod ALT,   J,         moveintogroup, d
bind = $mainMod ALT,   U,         moveoutofgroup

# ── Mouse ─────────────────────────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ══════════════════════════════════════════════════════════════════════════════
# WORKSPACES
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod CTRL SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod CTRL SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod CTRL SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod CTRL SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod CTRL SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod CTRL SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod CTRL SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod CTRL SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod CTRL SHIFT, 0, movetoworkspacesilent, 10

bind = $mainMod, bracketleft,  workspace, e-1
bind = $mainMod, bracketright, workspace, e+1
bind = $mainMod, comma,        workspace, e-1
bind = $mainMod, period,       workspace, e+1

bind = $mainMod, mouse_down,   workspace, e-1
bind = $mainMod, mouse_up,     workspace, e+1

bind = $mainMod, grave,        workspace, previous

# ── Special / scratchpad ──────────────────────────────────────────────────────
bind = $mainMod,       S,      togglespecialworkspace, magic
bind = $mainMod SHIFT, S,      movetoworkspace, special:magic

# ── Multi-monitor ─────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, greater, movecurrentworkspacetomonitor, r
bind = $mainMod SHIFT, less,    movecurrentworkspacetomonitor, l
bind = $mainMod,       semicolon, focusmonitor, +1
bind = $mainMod SHIFT, semicolon, movewindow, mon:+1

# ══════════════════════════════════════════════════════════════════════════════
# MEDIA & HARDWARE KEYS
# bindl = works even when screen is locked
# ══════════════════════════════════════════════════════════════════════════════

bindl = , XF86AudioRaiseVolume,  exec, $scriptsDir/volume.sh up
bindl = , XF86AudioLowerVolume,  exec, $scriptsDir/volume.sh down
bindl = , XF86AudioMute,         exec, $scriptsDir/volume.sh mute
bindl = , XF86AudioMicMute,      exec, $scriptsDir/volume.sh micmute

binde = , XF86MonBrightnessUp,   exec, $scriptsDir/brightness.sh up
binde = , XF86MonBrightnessDown, exec, $scriptsDir/brightness.sh down

bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioStop,  exec, playerctl stop

# ══════════════════════════════════════════════════════════════════════════════
# SCREENSHOTS
# ══════════════════════════════════════════════════════════════════════════════

bind = ,            Print,  exec, $scriptsDir/screenshot.sh full
bind = SHIFT,       Print,  exec, $scriptsDir/screenshot.sh region
bind = $mainMod,    Print,  exec, $scriptsDir/screenshot.sh window
bind = CTRL,        Print,  exec, $scriptsDir/screenshot.sh clipboard

# ══════════════════════════════════════════════════════════════════════════════
# SCREEN RECORDING
# Note: Super+Alt+R to avoid conflict with Super+Shift+R (config reload)
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod ALT, R, exec, $scriptsDir/record-screen.sh toggle

# ══════════════════════════════════════════════════════════════════════════════
# DESKTOP UTILITIES
# ══════════════════════════════════════════════════════════════════════════════

bind = $mainMod,       W,  exec, $scriptsDir/wallpaper.sh menu
bind = $mainMod SHIFT, W,  exec, $scriptsDir/wallpaper.sh random
bind = $mainMod SHIFT, T,  exec, $scriptsDir/theme-switch.sh toggle
bind = $mainMod SHIFT, C,  exec, hyprpicker -a
bind = $mainMod,       N,  exec, swaync-client -t
bind = $mainMod,       Delete, exec, hyprlock
bind = $mainMod,       V,  exec, cliphist list | rofi -dmenu -config ~/.config/rofi/launcher.rasi | cliphist decode | wl-copy
bind = $mainMod,       R,  exec, rofi -show run    -config ~/.config/rofi/launcher.rasi
bind = $mainMod CTRL,  S,  exec, rofi -show ssh    -config ~/.config/rofi/launcher.rasi
