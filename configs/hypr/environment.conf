# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — environment.conf
# Wayland, toolkit, and XDG environment variables.
# ══════════════════════════════════════════════════════════════════════════════

# ── Wayland session type ───────────────────────────────────────────────────────
env = WAYLAND_DISPLAY,wayland-0
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland

# ── XDG base directories ───────────────────────────────────────────────────────
env = XDG_DATA_HOME,$HOME/.local/share
env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_STATE_HOME,$HOME/.local/state
env = XDG_CACHE_HOME,$HOME/.cache

# ── Qt — force Wayland backend, use qt6ct for theming ─────────────────────────
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_ENABLE_HIGHDPI_SCALING,1
env = QT_SCALE_FACTOR_ROUNDING_POLICY,PassThrough

# ── GTK — Wayland backend, disable CSD where appropriate ──────────────────────
env = GDK_BACKEND,wayland,x11,*
env = GTK_USE_PORTAL,1

# ── SDL — prefer Wayland ───────────────────────────────────────────────────────
env = SDL_VIDEODRIVER,wayland,x11,offscreen

# ── Clutter — Wayland backend ─────────────────────────────────────────────────
env = CLUTTER_BACKEND,wayland

# ── Electron / Chromium — Ozone Wayland ───────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1

# ── Mozilla / Firefox ─────────────────────────────────────────────────────────
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1

# ── Cursor ────────────────────────────────────────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# ── D-Bus ─────────────────────────────────────────────────────────────────────
env = DBUS_SESSION_BUS_ADDRESS,unix:path=/run/user/$UID/bus

# ── Java / AWT — prevent blank windows on Wayland ────────────────────────────
env = _JAVA_AWT_WM_NONREPARENTING,1
env = AWT_TOOLKIT,MToolkit

# ── Input method ──────────────────────────────────────────────────────────────
env = INPUT_METHOD,fcitx
env = GTK_IM_MODULE,wayland
env = QT_IM_MODULE,fcitx

# ── Path additions ─────────────────────────────────────────────────────────────
env = PATH,$HOME/.local/bin:$PATH
