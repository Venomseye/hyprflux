# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — environment.conf
# Wayland, toolkit, and XDG environment variables.
# Tested against Hyprland 0.41+ (Arch Linux rolling).
# ══════════════════════════════════════════════════════════════════════════════

# ── Wayland session ───────────────────────────────────────────────────────────
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland

# ── XDG base directories ──────────────────────────────────────────────────────
env = XDG_DATA_HOME,$HOME/.local/share
env = XDG_CONFIG_HOME,$HOME/.config
env = XDG_STATE_HOME,$HOME/.local/state
env = XDG_CACHE_HOME,$HOME/.cache

# ── Qt — Wayland backend + theming ───────────────────────────────────────────
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# ── GTK — Wayland backend ────────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11,*
env = GTK_USE_PORTAL,1

# ── SDL — prefer Wayland ──────────────────────────────────────────────────────
env = SDL_VIDEODRIVER,wayland

# ── Clutter ───────────────────────────────────────────────────────────────────
env = CLUTTER_BACKEND,wayland

# ── Electron / Chromium — Ozone Wayland ──────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = NIXOS_OZONE_WL,1

# ── Mozilla / Firefox ────────────────────────────────────────────────────────
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DBUS_REMOTE,1

# ── Cursor ────────────────────────────────────────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# ── Java / AWT ────────────────────────────────────────────────────────────────
env = _JAVA_AWT_WM_NONREPARENTING,1

# ── PATH additions ────────────────────────────────────────────────────────────
env = PATH,$HOME/.local/bin:$PATH

# ── NVIDIA (uncomment if you have an NVIDIA GPU) ─────────────────────────────
