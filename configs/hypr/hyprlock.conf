# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — hyprlock.conf
# Screen locker configuration for hyprlock.
# https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/
# ══════════════════════════════════════════════════════════════════════════════

general {
    disable_loading_bar     = true
    grace                   = 0
    hide_cursor             = true
    no_fade_in              = false
    no_fade_out             = false
    ignore_empty_input      = false
}

# ── Background — blurred screenshot ──────────────────────────────────────────
background {
    monitor     =
    path        = screenshot

    blur_passes = 3
    blur_size   = 7
    noise       = 0.0117
    contrast    = 0.8917
    brightness  = 0.8172
    vibrancy    = 0.1696
    vibrancy_darkness = 0.0
}

# ── Clock (updates every second) ─────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M')"
    color       = rgba(192, 202, 245, 1.0)
    font_size   = 72
    font_family = JetBrainsMono Nerd Font Bold

    position    = 0, 280
    halign      = center
    valign      = center

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.5)
}

# ── Date (updates every minute) ──────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color       = rgba(169, 177, 214, 0.85)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font

    position    = 0, 195
    halign      = center
    valign      = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(0, 0, 0, 0.5)
}

# ── User label ────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        =   $USER
    color       = rgba(192, 202, 245, 1.0)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font

    position    = 0, 90
    halign      = center
    valign      = center

    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(0, 0, 0, 0.4)
}

# ── Password input field ──────────────────────────────────────────────────────
input-field {
    monitor     =
    size        = 260, 52
    outline_thickness = 2

    dots_size       = 0.25
    dots_spacing    = 0.20
    dots_center     = true
    dots_rounding   = -1

    outer_color     = rgba(122, 162, 247, 0.85)
    inner_color     = rgba(26, 27, 38, 0.92)
    font_color      = rgba(192, 202, 245, 1.0)

    fade_on_empty   = true
    fade_timeout    = 2000

    placeholder_text = <span foreground="##565f89"><i> Enter password…</i></span>
    hide_input      = false
    rounding        = 10

    check_color     = rgba(158, 206, 106, 1.0)
    fail_color      = rgba(247, 118, 142, 1.0)
    fail_text       = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_arc        = 46
    fail_timeout    = 2000

    capslock_color  = rgba(224, 175, 104, 1.0)

    position        = 0, -20
    halign          = center
    valign          = center
}
