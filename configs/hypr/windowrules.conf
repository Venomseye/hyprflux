# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — windowrules.conf
# Per-application window rules for floating, opacity, size, and position.
# ══════════════════════════════════════════════════════════════════════════════
#
# Syntax (v2):
#   windowrulev2 = <rule>, <condition>[, <condition>...]
#
# Common conditions:
#   class:<regex>      Match window class (use hyprctl clients to find)
#   title:<regex>      Match window title
#   floating:0|1       Match tiled or floating windows
#   fullscreen:0|1     Match fullscreen state
#   xwayland:0|1       Match XWayland windows
# ══════════════════════════════════════════════════════════════════════════════

# ══════════════════════════════════════════════════════════════════════════════
# FLOATING WINDOWS
# ══════════════════════════════════════════════════════════════════════════════

# ── System dialogs & utilities ────────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(qt5ct)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, class:^(kvantummanager)$
windowrulev2 = float, class:^(xdg-desktop-portal)$
windowrulev2 = float, class:^(org.freedesktop.impl.portal.desktop.gtk)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$

# ── File managers (small dialogs) ─────────────────────────────────────────────
windowrulev2 = float, class:^(thunar)$, title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$, title:^(Confirm to replace files)$
windowrulev2 = float, class:^(thunar)$, title:^(Thunar Preferences)$

# ── Archive manager ───────────────────────────────────────────────────────────
windowrulev2 = float, class:^(file-roller)$

# ── Screenshot / annotation tool ──────────────────────────────────────────────
windowrulev2 = float, class:^(swappy)$

# ── Image / media viewers ─────────────────────────────────────────────────────
windowrulev2 = float, class:^(imv)$
windowrulev2 = float, class:^(swayimg)$
windowrulev2 = float, class:^(mpv)$
windowrulev2 = float, class:^(vlc)$

# ── Calculator ────────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(gnome-calculator)$
windowrulev2 = float, class:^(qalculate-gtk)$

# ── Calendar popups ───────────────────────────────────────────────────────────
windowrulev2 = float, class:^(gnome-calendar)$

# ── Color picker ──────────────────────────────────────────────────────────────
windowrulev2 = float, class:^(hyprpicker)$

# ── About dialogs ─────────────────────────────────────────────────────────────
windowrulev2 = float, title:^(About .*)$
windowrulev2 = float, title:^(.* Preferences)$
windowrulev2 = float, title:^(Preferences)$

# ── Bitwarden & password managers ────────────────────────────────────────────
windowrulev2 = float, class:^(bitwarden)$
windowrulev2 = float, class:^(keepassxc)$

# ── Scratchpad / special workspace ────────────────────────────────────────────
windowrulev2 = float, class:^(scratchpad)$
windowrulev2 = center, class:^(scratchpad)$
windowrulev2 = size 900 600, class:^(scratchpad)$

# ══════════════════════════════════════════════════════════════════════════════
# SIZES & POSITIONS (for floating windows)
# ══════════════════════════════════════════════════════════════════════════════

windowrulev2 = size 900 600, class:^(pavucontrol)$
windowrulev2 = center,       class:^(pavucontrol)$

windowrulev2 = size 800 500, class:^(blueman-manager)$
windowrulev2 = center,       class:^(blueman-manager)$

windowrulev2 = size 750 550, class:^(nm-connection-editor)$
windowrulev2 = center,       class:^(nm-connection-editor)$

windowrulev2 = size 850 600, class:^(nwg-look)$
windowrulev2 = center,       class:^(nwg-look)$

windowrulev2 = size 400 500, class:^(bitwarden)$, title:^(Bitwarden — Unlock)$
windowrulev2 = center,       class:^(bitwarden)$

# ══════════════════════════════════════════════════════════════════════════════
# OPACITY RULES
# ══════════════════════════════════════════════════════════════════════════════
# Syntax: opacity <active_opacity> <inactive_opacity>

# Terminal — slight transparency when inactive
windowrulev2 = opacity 1.0 0.9, class:^(kitty)$

# Rofi — handled by its own CSS; set to opaque here
windowrulev2 = opacity 1.0 1.0, class:^(Rofi)$

# File manager
windowrulev2 = opacity 1.0 0.95, class:^(thunar)$

# Code editors
windowrulev2 = opacity 1.0 0.95, class:^(Code)$
windowrulev2 = opacity 1.0 0.95, class:^(code-oss)$

# ══════════════════════════════════════════════════════════════════════════════
# LAYER RULES
# ══════════════════════════════════════════════════════════════════════════════

# Waybar — animated slide, no shadow
layerrule = blur,       waybar
layerrule = ignorezero, waybar
layerrule = animation slide top, waybar

# Rofi — fade in
layerrule = blur,       rofi
layerrule = ignorezero, rofi
layerrule = animation fade, rofi

# Dunst / notification popups — slide
layerrule = blur,       notifications
layerrule = ignorezero, notifications
layerrule = animation slide right, notifications

# SwayNC — slide from right
layerrule = blur,       swaync-control-center
layerrule = ignorezero, swaync-control-center
layerrule = animation slide right, swaync-control-center

layerrule = blur,       swaync-notification-window
layerrule = ignorezero, swaync-notification-window

# Wlogout — fade
layerrule = animation fade, logout_dialog

# ══════════════════════════════════════════════════════════════════════════════
# FULLSCREEN RULES
# ══════════════════════════════════════════════════════════════════════════════

# Games — real fullscreen, no decoration
windowrulev2 = fullscreen, class:^(steam_app_.*)$
windowrulev2 = nodecoration, class:^(steam_app_.*)$
windowrulev2 = immediate, class:^(steam_app_.*)$   # Allow tearing for games

# ══════════════════════════════════════════════════════════════════════════════
# XWAYLAND RULES
# ══════════════════════════════════════════════════════════════════════════════

# Force zero scaling for legacy X apps
windowrulev2 = xwayland:1, rounding 0

# ══════════════════════════════════════════════════════════════════════════════
# IDLE INHIBIT (prevent sleep while apps are active)
# ══════════════════════════════════════════════════════════════════════════════

windowrulev2 = idleinhibit fullscreen, fullscreen:1
windowrulev2 = idleinhibit always, class:^(mpv)$
windowrulev2 = idleinhibit always, class:^(vlc)$
windowrulev2 = idleinhibit always, class:^(steam_app_.*)$
