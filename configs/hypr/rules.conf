# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — rules.conf
# Workspace assignment rules for common applications.
# ══════════════════════════════════════════════════════════════════════════════
#
# These rules automatically place applications on specific workspaces when
# they launch. Adjust to match your own workflow.
#
# Syntax:
#   windowrulev2 = workspace <n> [silent], class:^(<regex>)$
#
# The "silent" keyword moves the window without switching to that workspace.
# ══════════════════════════════════════════════════════════════════════════════

# ── Workspace 1 — Terminal / Dev ──────────────────────────────────────────────
# (terminals open on whatever workspace is current — no forced assignment)

# ── Workspace 2 — Browser ─────────────────────────────────────────────────────
windowrulev2 = workspace 2 silent, class:^(firefox)$
windowrulev2 = workspace 2 silent, class:^(chromium)$
windowrulev2 = workspace 2 silent, class:^(Brave-browser)$

# ── Workspace 3 — Code editor ─────────────────────────────────────────────────
windowrulev2 = workspace 3 silent, class:^(Code)$
windowrulev2 = workspace 3 silent, class:^(code-oss)$
windowrulev2 = workspace 3 silent, class:^(jetbrains-.*)$
windowrulev2 = workspace 3 silent, class:^(emacs)$

# ── Workspace 4 — Files ───────────────────────────────────────────────────────
windowrulev2 = workspace 4 silent, class:^(thunar)$
windowrulev2 = workspace 4 silent, class:^(nemo)$
windowrulev2 = workspace 4 silent, class:^(nautilus)$

# ── Workspace 5 — Media ───────────────────────────────────────────────────────
windowrulev2 = workspace 5 silent, class:^(vlc)$
windowrulev2 = workspace 5 silent, class:^(mpv)$
windowrulev2 = workspace 5 silent, class:^(Spotify)$

# ── Workspace 6 — Communication ───────────────────────────────────────────────
windowrulev2 = workspace 6 silent, class:^(vesktop)$
windowrulev2 = workspace 6 silent, class:^(discord)$
windowrulev2 = workspace 6 silent, class:^(thunderbird)$
windowrulev2 = workspace 6 silent, class:^(Slack)$
windowrulev2 = workspace 6 silent, class:^(telegramdesktop)$

# ── Workspace 7 — Office ──────────────────────────────────────────────────────
windowrulev2 = workspace 7 silent, class:^(libreoffice.*)$
windowrulev2 = workspace 7 silent, class:^(zathura)$

# ── Workspace 8 — System ──────────────────────────────────────────────────────
windowrulev2 = workspace 8 silent, class:^(pavucontrol)$
windowrulev2 = workspace 8 silent, class:^(blueman-manager)$

# ── Workspace 9 — Gaming ──────────────────────────────────────────────────────
windowrulev2 = workspace 9 silent, class:^(steam)$
windowrulev2 = workspace 9 silent, class:^(lutris)$
windowrulev2 = workspace 9 silent, class:^(heroic)$

# ── Workspace 10 — Monitoring ─────────────────────────────────────────────────
windowrulev2 = workspace 10 silent, class:^(btop)$
windowrulev2 = workspace 10 silent, class:^(nvtop)$
