# ══════════════════════════════════════════════════════════════════════════════
# Create shaders directory (prevents Hyprland shader path error)
exec-once = mkdir -p ~/.config/hypr/shaders

# HyprFlux — autostart.conf
# Applications launched once at Hyprland startup.
# exec-once = run exactly once (not on config reload)
# exec       = run at startup AND on every config reload
# ══════════════════════════════════════════════════════════════════════════════

# ── D-Bus & systemd session environment ──────────────────────────────────────
# Must run first — exports session vars so portals and services see them.
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

# ── XDG desktop portals ───────────────────────────────────────────────────────
# Start hyprland portal first, then the main dispatcher.
# sleep gives dbus-update-activation-environment time to propagate.
exec-once = sleep 1 && systemctl --user start xdg-desktop-portal-hyprland
exec-once = sleep 2 && systemctl --user start xdg-desktop-portal

# ── Polkit authentication agent ───────────────────────────────────────────────
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Wallpaper daemon ──────────────────────────────────────────────────────────
exec-once = hyprpaper

# ── Status bar ────────────────────────────────────────────────────────────────
exec-once = waybar

# ── Notification daemon & centre (swaync handles both) ────────────────────────
exec-once = swaync

# ── Idle management & automatic screen locking ────────────────────────────────
exec-once = hypridle

# ── Network manager tray ─────────────────────────────────────────────────────
exec-once = nm-applet --indicator

# ── Bluetooth tray ───────────────────────────────────────────────────────────
exec-once = sleep 2 && blueman-applet

# ── Clipboard history (cliphist) ─────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Cursor theme (applies to XWayland apps too) ───────────────────────────────
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# ── Restore last wallpaper ────────────────────────────────────────────────────
exec-once = sleep 1 && $HOME/.local/share/hyprflux/scripts/wallpaper.sh restore
