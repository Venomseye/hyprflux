# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — autostart.conf
# Applications and daemons launched once when Hyprland starts.
# ══════════════════════════════════════════════════════════════════════════════
#
# exec-once  — Run exactly once at startup (not on config reload).
# exec       — Run at startup AND on every config reload.
# ══════════════════════════════════════════════════════════════════════════════

# ── D-Bus & systemd environment ───────────────────────────────────────────────
# Export Hyprland session variables so systemd user services and D-Bus
# activated services can see WAYLAND_DISPLAY, XDG_SESSION_TYPE, etc.
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE

# ── Polkit authentication agent ───────────────────────────────────────────────
# Required for graphical password prompts (sudo GUI, package managers, etc.)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Wallpaper daemon ──────────────────────────────────────────────────────────
exec-once = hyprpaper

# ── Status bar ────────────────────────────────────────────────────────────────
exec-once = waybar

# ── Notification daemon ───────────────────────────────────────────────────────
exec-once = dunst

# ── Notification center ───────────────────────────────────────────────────────
exec-once = swaync

# ── Idle management & screen locking ──────────────────────────────────────────
exec-once = hypridle

# ── Network manager tray applet ───────────────────────────────────────────────
exec-once = nm-applet --indicator

# ── Bluetooth tray applet ─────────────────────────────────────────────────────
exec-once = blueman-applet

# ── Clipboard manager ─────────────────────────────────────────────────────────
# wl-paste pipes all clipboard changes into cliphist for history tracking
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── XDG portal ────────────────────────────────────────────────────────────────
# Provides screen sharing, file picking, etc. for sandboxed apps
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# ── Cursor theme ──────────────────────────────────────────────────────────────
# Ensure cursor is applied to all apps including XWayland
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# ── Restore last wallpaper ────────────────────────────────────────────────────
# The wallpaper script caches the last selection; re-apply on login
exec-once = ~/.local/share/hyprflux/scripts/wallpaper.sh restore
