# ══════════════════════════════════════════════════════════════════════════════
# HyprFlux — hyprland.conf
# Root configuration file. Sources all modular configs.
# Tested against Hyprland 0.41+ (Arch Linux rolling).
# ══════════════════════════════════════════════════════════════════════════════

# ── Theme & colours (load first — other modules reference these vars) ─────────
source = ~/.config/hypr/theme.conf

# ── Environment variables ─────────────────────────────────────────────────────
source = ~/.config/hypr/environment.conf

# ── Monitor configuration ─────────────────────────────────────────────────────
source = ~/.config/hypr/monitors.conf

# ── Input devices ─────────────────────────────────────────────────────────────
source = ~/.config/hypr/input.conf

# ── Animations ────────────────────────────────────────────────────────────────
source = ~/.config/hypr/animations.conf

# ── Window rules ──────────────────────────────────────────────────────────────
source = ~/.config/hypr/windowrules.conf

# ── Workspace rules ───────────────────────────────────────────────────────────
source = ~/.config/hypr/rules.conf

# ── Key bindings ──────────────────────────────────────────────────────────────
source = ~/.config/hypr/keybinds.conf

# ── Autostart applications ────────────────────────────────────────────────────
source = ~/.config/hypr/autostart.conf

# ══════════════════════════════════════════════════════════════════════════════
# GENERAL
# ══════════════════════════════════════════════════════════════════════════════

general {
    gaps_in                 = 4
    gaps_out                = 10
    border_size             = 2

    col.active_border       = $accent $accent_alt 45deg
    col.inactive_border     = $border_inactive

    layout                  = dwindle
    resize_on_border        = true
    allow_tearing           = false
}

# ══════════════════════════════════════════════════════════════════════════════
# DECORATION
# ══════════════════════════════════════════════════════════════════════════════

decoration {
    rounding                = 10
    rounding_power          = 2.0

    active_opacity          = 1.0
    inactive_opacity        = 0.95
    fullscreen_opacity      = 1.0

    shadow {
        enabled             = true
        range               = 20
        render_power        = 3
        color               = $shadow_color
        color_inactive      = $shadow_color_inactive
        offset              = 0 4
    }

    blur {
        enabled             = true
        size                = 6
        passes              = 3
        noise               = 0.02
        contrast            = 0.9
        brightness          = 0.8
        vibrancy            = 0.2
        vibrancy_darkness   = 0.0
        xray                = false
        ignore_opacity      = false
        popups              = true
        popups_ignorealpha  = 0.2
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# LAYOUT
# ══════════════════════════════════════════════════════════════════════════════

dwindle {
    pseudotile              = false
    preserve_split          = true
    smart_split             = false
    smart_resizing          = true
    force_split             = 2
}

master {
    new_status              = master
    new_on_top              = true
    mfact                   = 0.5
}

# ══════════════════════════════════════════════════════════════════════════════
# MISC
# ══════════════════════════════════════════════════════════════════════════════

misc {
    disable_hyprland_logo           = true
    disable_splash_rendering        = true
    force_default_wallpaper         = 0
    mouse_move_enables_dpms         = true
    key_press_enables_dpms          = true
    animate_manual_resizes          = true
    enable_swallow                  = true
    swallow_regex                   = ^(kitty|foot)$
    focus_on_activate               = false
    new_window_takes_over_fullscreen = 2
    initial_workspace_tracking      = 1
    middle_click_paste              = false
}

# ══════════════════════════════════════════════════════════════════════════════
# XWAYLAND
# ══════════════════════════════════════════════════════════════════════════════

xwayland {
    force_zero_scaling      = true
}

# ══════════════════════════════════════════════════════════════════════════════
# CURSOR
# ══════════════════════════════════════════════════════════════════════════════

cursor {
    no_hardware_cursors         = 2
    warp_on_change_workspace    = false
    hide_on_key_press           = false
    inactive_timeout            = 0
}

# ══════════════════════════════════════════════════════════════════════════════
# RENDER
# (NVIDIA users: add env = WLR_NO_HARDWARE_CURSORS,1 to environment.conf)
# ══════════════════════════════════════════════════════════════════════════════

render {
    direct_scanout  = false
}
